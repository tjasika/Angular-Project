<div class="flex flex-col h-screen">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-8 py-4 flex flex-row items-center justify-between">
    <div class="flex flex-row items-center gap-2">
      <span class="material-symbols-outlined text-primary text-3xl">school</span>
      <h1 class="text-lg font-bold text-gray-800">Tjaša's App</h1>
    </div>

    <nav class="flex flex-row gap-1">
      <div routerLink="/users" routerLinkActive="text-primary" 
        class="flex flex-row items-center gap-2 px-4 py-2 rounded-lg cursor-pointer text-gray-500 hover:bg-gray-100 transition-all"
        #rlaUsers="routerLinkActive">
        <span class="material-symbols-outlined text-sm">group</span>
        <span class="text-sm font-medium">Users</span>
      </div>

      <div routerLink="/absences" routerLinkActive="text-primary"
        class="flex flex-row items-center gap-2 px-4 py-2 rounded-lg cursor-pointer text-gray-500 hover:bg-gray-100 transition-all"
        #rlaAbsences="routerLinkActive">
        <span class="material-symbols-outlined text-sm">account_circle_off</span>
        <span class="text-sm font-medium">Absences</span>
      </div>

      <div routerLink="/settings" routerLinkActive="text-primary"
        class="flex flex-row items-center gap-2 px-4 py-2 rounded-lg cursor-pointer text-gray-500 hover:bg-gray-100 transition-all"
        #rlaSettings="routerLinkActive">
        <span class="material-symbols-outlined text-sm">settings</span>
        <span class="text-sm font-medium">Settings</span>
      </div>
    </nav>
  </header>

  <main class="flex-1 p-8 overflow-auto">
    <router-outlet />
  </main>
</div>
