<h1 class="text-2xl font-bold">Settings</h1>

<div class="pt-5 pr-100">
    <form>
        <input [(ngModel)]="clientId" name="clientId" placeholder="Enter Client ID" class="border p-2 mb-4 w-full" />
        <input [(ngModel)]="clientSecret" name="clientSecret" placeholder="Enter Client Secret" class="border p-2 mb-4 w-full" />
        <button type="button" (click)="saveSettings()" class="bg-blue-500 text-white p-2 rounded">Save Settings</button>
    </form>
</div>
