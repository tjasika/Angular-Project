<div class="w-full h-screen flex justify-center items-center">

    <div class="flex flex-col">
        <h1 class="text-2xl font-bold">Settings</h1>
        <p>Provide the api keys to enter the app.</p>
        <div class="pt-5 pr-100">
            <form>
                <input [(ngModel)]="clientId" name="clientId" placeholder="Enter Client ID" class="w-full px-4 py-2 mb-4 border border-gray-300 rounded-lg shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
                <input [(ngModel)]="clientSecret" name="clientSecret" placeholder="Enter Client Secret" class="w-full px-4 py-2 mb-4 border border-gray-300 rounded-lg shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
                <button type="button" (click)="saveSettings()" class="bg-primary text-white p-2 rounded cursor-pointer hover:bg-secondary">Save Settings</button>
            </form>
        </div> 
    </div>
   
</div>
